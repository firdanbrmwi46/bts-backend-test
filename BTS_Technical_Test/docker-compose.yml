version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: bts_mysql_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword123
      MYSQL_DATABASE: bts_technical_test
    ports:
      - "3307:3306" 
    volumes:
      - db_data:/var/lib/mysql

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bts_api_container
    restart: always
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Database=bts_technical_test;User=root;Password=rootpassword123;
    depends_on:
      - db

volumes:
  db_data: